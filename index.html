<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#040404;
overflow-x:hidden;
color:white;
}

/* BACKGROUND */

.background{
position:fixed;
inset:0;
z-index:-10;
overflow:hidden;

background:
radial-gradient(circle at top left,#ffd70022,transparent 25%),
radial-gradient(circle at bottom right,#ffae0020,transparent 25%),
linear-gradient(135deg,#020202,#0a0a0a,#050505);
}

.grid{
position:absolute;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(255,215,0,.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,215,0,.04) 1px, transparent 1px);

background-size:60px 60px;

mask-image:linear-gradient(to bottom,transparent,black,black,transparent);

animation:gridMove 12s linear infinite;
}

@keyframes gridMove{
0%{transform:translateY(0px);}
100%{transform:translateY(60px);}
}

.wave{
position:absolute;
width:120%;
height:120%;
border-radius:45%;

background:
radial-gradient(circle,
rgba(255,215,0,.08),
transparent 70%);

animation:rotate 18s linear infinite;
}

.wave1{
top:-30%;
left:-20%;
}

.wave2{
bottom:-40%;
right:-20%;
animation-duration:25s;
}

@keyframes rotate{
100%{
transform:rotate(360deg);
}
}

.glow{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.25;
animation:float 10s ease-in-out infinite;
}

.glow1{
width:400px;
height:400px;
background:#ffd700;
top:-120px;
left:-120px;
}

.glow2{
width:300px;
height:300px;
background:#ffb300;
bottom:-80px;
right:-80px;
animation-delay:2s;
}

.glow3{
width:250px;
height:250px;
background:#fff2a8;
top:40%;
left:45%;
animation-delay:4s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(35px);
}
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.container{
width:100%;
max-width:1250px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,215,0,.12);

backdrop-filter:blur(18px);

border-radius:40px;

padding:50px;

position:relative;
overflow:hidden;

box-shadow:
0 0 80px rgba(255,215,0,.08),
0 0 180px rgba(0,0,0,.7);
}

.container::before{
content:'';
position:absolute;
inset:0;

background:
linear-gradient(
120deg,
transparent,
rgba(255,215,0,.08),
transparent);

transform:translateX(-100%);
animation:shine 6s infinite;
}

@keyframes shine{
100%{
transform:translateX(150%);
}
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
gap:60px;
flex-wrap:wrap;
}

/* IMAGE */

.image-area{
flex:1;
display:flex;
justify-content:center;
min-width:300px;
}

.image-box{
width:360px;
height:360px;

border-radius:35px;
overflow:hidden;

position:relative;

border:2px solid rgba(255,215,0,.2);

background:#111;

box-shadow:
0 0 40px rgba(255,215,0,.15),
0 0 120px rgba(255,215,0,.08);
}

.image-box::before{
content:'';
position:absolute;
inset:0;

background:
linear-gradient(
120deg,
transparent,
rgba(255,215,0,.3),
transparent);

transform:translateX(-100%);
animation:imageShine 5s infinite;
z-index:2;
}

@keyframes imageShine{
100%{
transform:translateX(150%);
}
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
image-rendering:auto;
filter:contrast(1.08) saturate(1.15);
}

/* CONTENT */

.content{
flex:1;
min-width:320px;
}

.badge{
display:inline-flex;
align-items:center;
gap:10px;

padding:12px 24px;

border-radius:50px;

background:rgba(255,215,0,.08);

border:1px solid rgba(255,215,0,.15);

color:#ffd700;

font-size:14px;
font-weight:700;

letter-spacing:2px;

margin-bottom:25px;
}

h1{
font-family:'Orbitron',sans-serif;

font-size:95px;
line-height:1;

margin-bottom:25px;

background:linear-gradient(to bottom,#fff,#ffd700);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 25px rgba(255,215,0,.2),
0 0 50px rgba(255,215,0,.15);
}

.description{
font-family:'Cairo',sans-serif;

font-size:20px;
line-height:2.1;

color:#d8d8d8;

max-width:650px;

margin-bottom:40px;
}

/* SOCIALS */

.socials{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.social{
position:relative;

display:flex;
align-items:center;
gap:18px;

padding:22px;

text-decoration:none;
color:white;

background:rgba(255,255,255,.03);

border:1px solid rgba(255,215,0,.08);

border-radius:24px;

overflow:hidden;

transition:.4s;
}

.social::before{
content:'';
position:absolute;
inset:0;

background:
linear-gradient(
90deg,
rgba(255,215,0,.18),
transparent);

opacity:0;
transition:.4s;
}

.social:hover::before{
opacity:1;
}

.social:hover{
transform:translateY(-10px);

border-color:#ffd70055;

box-shadow:
0 15px 40px rgba(255,215,0,.15);
}

.icon{
min-width:65px;
height:65px;

display:flex;
align-items:center;
justify-content:center;

border-radius:20px;

background:rgba(255,215,0,.08);

border:1px solid rgba(255,215,0,.1);

font-size:28px;

color:#ffd700;

transition:.4s;
}

.social:hover .icon{
background:#ffd700;
color:black;
transform:scale(1.08);
}

.social h3{
font-size:20px;
font-weight:700;
}

/* FOOTER */

.footer{
margin-top:55px;

padding-top:25px;

border-top:1px solid rgba(255,255,255,.08);

display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.footer p{
color:#8c8c8c;
font-size:14px;
}

.footer-icons{
display:flex;
gap:15px;
}

.footer-icons a{
width:50px;
height:50px;

display:flex;
align-items:center;
justify-content:center;

border-radius:18px;

background:rgba(255,255,255,.03);

border:1px solid rgba(255,215,0,.1);

color:#ffd700;

font-size:20px;

text-decoration:none;

transition:.35s;
}

.footer-icons a:hover{
background:#ffd700;
color:black;

transform:translateY(-5px) rotate(5deg);
}

/* MOBILE */

@media(max-width:950px){

.container{
padding:30px;
}

.top{
justify-content:center;
text-align:center;
}

.content{
display:flex;
flex-direction:column;
align-items:center;
}

h1{
font-size:65px;
}

.description{
margin:auto;
}

.image-box{
width:280px;
height:280px;
}

}

@media(max-width:600px){

.container{
padding:20px;
border-radius:25px;
}

h1{
font-size:48px;
}

.description{
font-size:16px;
}

.socials{
grid-template-columns:1fr;
}

.image-box{
width:230px;
height:230px;
}

.icon{
min-width:55px;
height:55px;
font-size:22px;
}

}

</style>
</head>
